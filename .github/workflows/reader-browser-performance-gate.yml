name: Reader Browser Performance Gate

on:
  workflow_dispatch:

# temporary until GitHub Actions quota resets
# pull_request:
# push:
#   branches:
#     - main

jobs:
  reader-browser-performance-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Reader browser performance gate
        run: npm run ci:reader:browser-perf